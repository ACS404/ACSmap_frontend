---
layout: opencs
title: Treatment Tracker
---

<style>
/* ═══════════════════════════════════════════════════════════
   TREATMENT TRACKER  —  ACS warm palette
   All colours reference the CSS variables from theme.scss
═══════════════════════════════════════════════════════════ */

/* ── Page wrapper ── */
.tx-app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 72px;
}

/* ── Page header ── */
.tx-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  padding: 28px 0 22px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.tx-header-left {}
.tx-page-title {
  font-family: var(--serif) !important;
  font-size: 34px !important;
  font-weight: 600;
  color: var(--text-main) !important;
  margin: 0;
  line-height: 1.1;
}
.tx-page-sub {
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 5px;
}
.tx-add-btn {
  background: var(--rose);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 24px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(224,122,106,0.3);
  flex-shrink: 0;
}
.tx-add-btn:hover {
  background: var(--terracotta);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(196,94,74,0.35);
}

/* ── Two-column grid ── */
.tx-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 24px;
  align-items: start;
}
@media (max-width: 820px) {
  .tx-grid { grid-template-columns: 1fr; }
}

/* ── Card base ── */
.tx-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(61,44,36,0.05);
}
.tx-card + .tx-card { margin-top: 20px; }

.tx-section-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 600;
  color: var(--text-main);
  margin: 0 0 4px;
}

/* ═══════════════════════════════════
   CALENDAR
═══════════════════════════════════ */
.cal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.cal-month-label {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 600;
  color: var(--text-main);
}
.cal-nav-btn {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 13px;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-main);
  transition: background 0.15s, border-color 0.15s;
  line-height: 1;
}
.cal-nav-btn:hover {
  background: var(--tan-light);
  border-color: var(--tan);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-dow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 5px 0 8px;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 6px 2px 3px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.12s;
  min-width: 0;
  position: relative;
}
.cal-cell:hover { background: var(--rose-pale); }
.cal-cell.empty  { cursor: default; pointer-events: none; }
.cal-cell.empty:hover { background: transparent; }
.cal-cell.today {
  background: var(--rose-pale);
}
.cal-cell.today .cal-num {
  color: var(--terracotta);
  font-weight: 800;
}
.cal-cell.selected {
  background: var(--rose) !important;
}
.cal-cell.selected .cal-num { color: white; font-weight: 700; }
.cal-cell.selected .cal-dots span { background: rgba(255,255,255,0.6) !important; }

.cal-num {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-main);
  line-height: 1;
  margin-bottom: 3px;
}
.cal-dots {
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: center;
}
.cal-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  display: block;
}

/* ═══════════════════════════════════
   MEDICATIONS LIST
═══════════════════════════════════ */
.meds-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.meds-count {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
}
.med-item {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 14px 16px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 13px;
  margin-bottom: 8px;
  transition: box-shadow 0.15s, transform 0.12s;
}
.med-item:hover {
  box-shadow: 0 4px 16px rgba(61,44,36,0.08);
  transform: translateY(-1px);
}
.med-color-strip {
  width: 5px;
  align-self: stretch;
  border-radius: 4px;
  flex-shrink: 0;
}
.med-info { flex: 1; min-width: 0; }
.med-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.med-detail {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.med-actions { display: flex; gap: 6px; flex-shrink: 0; }
.med-btn {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 9px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.12s, border-color 0.12s;
}
.med-btn:hover { background: var(--tan-light); border-color: var(--tan); }
.med-btn.del:hover {
  background: var(--rose-pale);
  border-color: var(--rose-light);
  color: var(--terracotta);
}

/* ═══════════════════════════════════
   RIGHT COLUMN: DAILY CHECKLIST
═══════════════════════════════════ */
.checklist-day-header {
  margin-bottom: 2px;
}
.checklist-date-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
}

/* Progress bar */
.tx-progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 14px;
}
.tx-progress-bar {
  flex: 1;
  height: 7px;
  background: var(--tan-light);
  border-radius: 4px;
  overflow: hidden;
}
.tx-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sage), #6aaa6e);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.tx-progress-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-main);
  flex-shrink: 0;
  min-width: 40px;
  text-align: right;
}

/* Checklist item */
.chk-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 12px 13px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  user-select: none;
}
.chk-item:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(61,44,36,0.07); }
.chk-item:active { transform: translateY(0); }
.chk-item.taken {
  background: var(--sage-pale) !important;
  border-color: var(--sage-light) !important;
}
.chk-item.taken .chk-name {
  text-decoration: line-through;
  color: var(--text-muted);
}

.chk-box {
  width: 22px; height: 22px;
  border: 2px solid var(--tan-light);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all 0.15s;
  flex-shrink: 0;
  color: white;
}
.chk-item.taken .chk-box {
  background: var(--sage);
  border-color: var(--sage);
}

.chk-info { flex: 1; min-width: 0; }
.chk-name  {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chk-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.chk-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Empty state */
.tx-empty {
  text-align: center;
  padding: 28px 12px;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.6;
}
.tx-empty-icon { font-size: 30px; margin-bottom: 10px; }

/* ═══════════════════════════════════
   TABS  (schedule / notes)
═══════════════════════════════════ */
.tx-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  border-radius: 20px 20px 0 0;
  overflow: hidden;
  flex-shrink: 0;
}
.tx-tab-btn {
  flex: 1; padding: 12px 8px;
  background: var(--cream); border: none;
  font-family: var(--sans); font-size: 13px; font-weight: 700;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color 0.15s, border-color 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tx-tab-btn.active {
  background: var(--warm-white);
  color: var(--terracotta);
  border-bottom-color: var(--rose);
}
.tx-tab-btn:hover:not(.active) { color: var(--text-main); background: var(--warm-white); }
.tx-tab-badge {
  background: var(--rose); color: white;
  font-size: 9px; font-weight: 800;
  padding: 1px 5px; border-radius: 8px;
  display: none;
}
.tx-tab-badge.show { display: inline-block; }
.tx-tab-pane { display: none; }
.tx-tab-pane.active { display: block; }

/* ═══════════════════════════════════
   NOTES PANE
═══════════════════════════════════ */
.tn-form-area {
  padding: 0 0 14px;
  border-bottom: 1px solid rgba(196,168,130,0.2);
  margin-bottom: 12px;
}
.tn-form-date {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-muted);
  margin-bottom: 10px; display: block;
}
.tn-sel, .tn-ta {
  width: 100%; box-sizing: border-box;
  background: var(--cream);
  border: 1px solid rgba(196,168,130,0.4);
  border-radius: 9px; font-family: var(--sans);
  font-size: 13px; color: var(--text-main);
  margin-bottom: 7px;
  transition: border-color 0.2s;
}
.tn-sel { padding: 8px 10px; appearance: none; cursor: pointer; }
.tn-ta  { padding: 9px 10px; resize: vertical; min-height: 68px; }
.tn-sel:focus, .tn-ta:focus {
  outline: none; border-color: var(--rose);
  box-shadow: 0 0 0 3px rgba(224,122,106,0.1);
}
.tn-ta::placeholder { color: var(--text-muted); }
.tn-cat-row {
  display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px;
}
.tn-cat-chip {
  padding: 3px 10px; border-radius: 12px;
  border: 1.5px solid rgba(196,168,130,0.35);
  background: var(--warm-white); font-size: 11px; font-weight: 600;
  cursor: pointer; color: var(--text-muted);
  transition: all 0.12s; user-select: none;
}
.tn-cat-chip.active {
  border-color: var(--rose); background: var(--rose-pale);
  color: var(--terracotta);
}
.tn-save-btn {
  width: 100%; padding: 9px;
  background: var(--rose); color: white; border: none;
  border-radius: 9px; font-family: var(--sans);
  font-size: 13px; font-weight: 700;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
}
.tn-save-btn:hover:not(:disabled) { background: var(--terracotta); transform: translateY(-1px); }
.tn-save-btn:disabled { background: var(--tan-light); color: var(--text-muted); cursor: not-allowed; transform: none; }
.tn-status {
  font-size: 11px; margin-top: 5px; min-height: 14px;
  text-align: center; color: var(--sage); font-weight: 600;
}
.tn-status.err { color: var(--terracotta); }

.tn-filter-row {
  display: flex; flex-wrap: wrap; gap: 5px;
  margin-bottom: 10px;
}
.tn-f-btn {
  padding: 3px 10px; border-radius: 12px;
  border: 1px solid rgba(196,168,130,0.3);
  background: transparent; font-family: var(--sans);
  font-size: 10px; font-weight: 700; cursor: pointer;
  color: var(--text-muted); transition: all 0.12s;
  text-transform: uppercase; letter-spacing: 0.04em;
}
.tn-f-btn.active {
  background: var(--rose-pale); border-color: var(--rose-light);
  color: var(--terracotta);
}

.tn-list-wrap {
  max-height: 340px; overflow-y: auto;
  display: flex; flex-direction: column; gap: 8px;
}
.tn-list-wrap::-webkit-scrollbar { width: 4px; }
.tn-list-wrap::-webkit-scrollbar-thumb { background: var(--tan-light); border-radius: 2px; }

.tn-note {
  background: var(--cream);
  border: 1px solid rgba(196,168,130,0.28);
  border-radius: 10px; padding: 10px 34px 10px 12px;
  position: relative;
  animation: tnIn 0.18s ease;
}
@keyframes tnIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
.tn-note[data-cat="side_effect"] { border-left: 3px solid var(--rose); }
.tn-note[data-cat="reminder"]    { border-left: 3px solid var(--tan); }
.tn-note[data-cat="general"]     { border-left: 3px solid var(--sage); }
.tn-note[data-cat="dosage"]      { border-left: 3px solid #6b9ecf; }
.tn-note[data-cat="symptom"]     { border-left: 3px solid #c987b8; }

.tn-note-badge {
  display: inline-block; padding: 2px 7px;
  border-radius: 4px; font-size: 9px; font-weight: 800;
  letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 4px;
}
.tn-note-badge.side_effect { background: var(--rose-pale);  color: var(--terracotta); }
.tn-note-badge.reminder    { background: #fdf3e3; color: #9b6a00; }
.tn-note-badge.general     { background: var(--sage-pale);  color: #4a7a4c; }
.tn-note-badge.dosage      { background: #e8f0fb; color: #2255aa; }
.tn-note-badge.symptom     { background: #f5eafb; color: #8a3fa0; }
.tn-note-med  { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 3px; }
.tn-note-text { font-size: 13px; color: var(--text-main); line-height: 1.5; }
.tn-note-time { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
.tn-del {
  position: absolute; right: 8px; top: 8px;
  background: rgba(224,122,106,0.12); border: none;
  border-radius: 5px; width: 21px; height: 21px;
  cursor: pointer; font-size: 11px; font-weight: 800;
  color: var(--terracotta); display: flex; align-items: center;
  justify-content: center; transition: background 0.12s;
}
.tn-del:hover { background: var(--rose-pale); }
.tn-empty-note {
  text-align: center; padding: 28px 12px;
  color: var(--text-muted); font-size: 13px; line-height: 1.7;
}
.tn-empty-note-icon { font-size: 26px; margin-bottom: 6px; }

/* ═══════════════════════════════════
   MODAL OVERLAY
═══════════════════════════════════ */
.tx-overlay {
  position: fixed; inset: 0;
  background: rgba(61,44,36,0.6);
  backdrop-filter: blur(8px);
  z-index: 9200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.tx-overlay.open { opacity: 1; pointer-events: auto; }

.tx-modal {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
  max-width: 530px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 72px rgba(61,44,36,0.2);
  transform: scale(0.95) translateY(10px);
  transition: transform 0.2s;
}
.tx-overlay.open .tx-modal { transform: scale(1) translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.modal-title {
  font-family: var(--serif);
  font-size: 25px;
  font-weight: 600;
  color: var(--text-main);
}
.modal-close {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 33px; height: 33px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: var(--text-muted);
  transition: all 0.15s;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--rose-pale); border-color: var(--rose-light); color: var(--rose); }

/* Form fields */
.f-group { margin-bottom: 16px; }
.f-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 5px;
}
.f-input,
.f-select,
.f-textarea {
  width: 100%;
  box-sizing: border-box;
  background: var(--cream);
  color: var(--text-main);
  border: 1px solid var(--tan-light);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: var(--sans);
  font-size: 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.f-input:focus,
.f-select:focus,
.f-textarea:focus {
  outline: none;
  border-color: var(--rose);
  box-shadow: 0 0 0 3px rgba(224,122,106,0.13);
}
.f-textarea { resize: vertical; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* AI description */
.ai-desc {
  background: var(--rose-pale);
  border: 1px solid var(--rose-light);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  color: var(--text-main);
  line-height: 1.65;
  margin-top: 8px;
  display: none;
}
.ai-desc.visible { display: block; }
.ai-loading {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 8px;
}
.ai-loading.visible { display: flex; }
.ai-spin {
  width: 14px; height: 14px;
  border: 2px solid var(--tan-light);
  border-top-color: var(--rose);
  border-radius: 50%;
  animation: txspin 0.7s linear infinite;
}
@keyframes txspin { to { transform: rotate(360deg); } }

/* Times */
.times-chips {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin-bottom: 8px;
}
.t-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--rose-pale);
  border: 1px solid var(--rose-light);
  border-radius: 20px;
  padding: 5px 11px;
  font-size: 13px;
  font-weight: 500;
  color: var(--terracotta);
}
.t-chip button {
  background: none; border: none;
  cursor: pointer; color: var(--terracotta);
  font-size: 14px; padding: 0; line-height: 1; opacity: 0.7;
}
.t-chip button:hover { opacity: 1; }
.time-add-row {
  display: flex; gap: 8px; align-items: center;
}
.time-input {
  flex: 1;
  background: var(--cream);
  border: 1px solid var(--tan-light);
  border-radius: 8px;
  padding: 9px 12px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text-main);
}
.time-input:focus { outline: none; border-color: var(--rose); }
.time-add-btn {
  background: var(--rose);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 9px 16px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  transition: background 0.15s;
}
.time-add-btn:hover { background: var(--terracotta); }

/* Color swatches */
.swatches {
  display: flex; gap: 9px; flex-wrap: wrap;
  margin-top: 6px;
}
.swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color 0.12s, transform 0.12s;
}
.swatch.active { border-color: var(--text-main); transform: scale(1.15); }

/* Modal submit */
.f-submit {
  width: 100%;
  background: var(--rose);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.12s;
  margin-top: 10px;
  box-shadow: 0 4px 14px rgba(224,122,106,0.3);
}
.f-submit:hover { background: var(--terracotta); transform: translateY(-1px); }

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════ -->
<script type="module">
import { pythonURI, fetchOptions } from '{{site.baseurl}}/assets/js/api/config.js';

/* ── EXPOSE to notes script (non-module) ── */
window._txPythonURI    = pythonURI;
window._txFetchOptions = fetchOptions;

/* ─── Constants ─────────────────────────────────────────── */
const MONTHS  = ['January','February','March','April','May','June',
                 'July','August','September','October','November','December'];
const DOW_ABR = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const PALETTE = ['#e07a6a','#c4a882','#8aaa8c','#6b9ecf',
                 '#c987b8','#e8b86d','#937468','#b8ceb9'];

/* ─── State ─────────────────────────────────────────────── */
let treatments   = [];          // active treatments for this user
let logsCache    = {};          // { 'YYYY-MM-DD': [TreatmentLog, …] }
let selectedDate = new Date();  // currently highlighted calendar date
let calYear      = new Date().getFullYear();
let calMonth     = new Date().getMonth();
let editingId    = null;        // null = add mode, number = edit mode
let chosenTimes  = [];          // time strings in the modal
let chosenColor  = PALETTE[0];  // hex in the modal
let lookupTimer  = null;


/* ─── Boot ──────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  await loadUser();
  await loadTreatments();
  renderCalendar();
  await renderChecklist(selectedDate);
  buildSwatches();
  document.getElementById('fStart').value = isoDate(new Date());

   // Close modal on overlay click
  document.getElementById('txOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('txOverlay')) txCloseModal();
  });
});

/* ─── User info ─────────────────────────────────────────── */
async function loadUser() {
  try {
    const r = await fetch(`${pythonURI}/api/id`, fetchOptions);
    if (r.ok) {
      const d = await r.json();
      document.getElementById('txUserLine').textContent =
        `${d.name}'s personal treatment plan`;
    }
  } catch (_) {}
}

/* ─── Treatments ────────────────────────────────────────── */
async function loadTreatments() {
  try {
    const r = await fetch(`${pythonURI}/api/treatments`, fetchOptions);
    treatments = r.ok ? await r.json() : [];
  } catch (_) { treatments = []; }
  window._txTreatments = treatments;
  renderMedsList();
}

function renderMedsList() {
  const el     = document.getElementById('medsList');
  const badge  = document.getElementById('medsCount');

  if (!treatments.length) {
    badge.style.display = 'none';
    el.innerHTML = `
      <div class="tx-empty">
        <div class="tx-empty-icon"></div>
        No medications added yet.<br>
        Click <strong>+ Add Medication</strong> to start tracking.
      </div>`;
    return;
  }

  badge.style.display = 'inline-block';
  badge.textContent   = `${treatments.length} active`;

  el.innerHTML = treatments.map(m => `
    <div class="med-item">
      <div class="med-color-strip" style="background:${m.color}"></div>
      <div class="med-info">
        <div class="med-name">${esc(m.medication_name)}</div>
        <div class="med-detail">
          ${m.dosage ? esc(m.dosage) + ' &middot; ' : ''}
          ${fmtFreq(m.frequency)}
          ${m.times && m.times.length ? ' &middot; ' + m.times.map(fmtTime).join(', ') : ''}
        </div>
      </div>
      <div class="med-actions">
        <button class="med-btn"     title="Edit"   onclick="window.txOpenEdit(${m.id})">🖋</button>
        <button class="med-btn del" title="Remove" onclick="window.txDelete(${m.id})">🗑</button>
      </div>
    </div>`).join('');
}

/* ─── Calendar ──────────────────────────────────────────── */
function renderCalendar() {
  document.getElementById('calLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const grid    = document.getElementById('calGrid');
  const today   = new Date();
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInM  = new Date(calYear, calMonth + 1, 0).getDate();

  // Build header row
  let html = DOW_ABR.map(d =>
    `<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInM; d++) {
    const dt     = new Date(calYear, calMonth, d);
    const isT    = dt.toDateString() === today.toDateString();
    const isSel  = dt.toDateString() === selectedDate.toDateString();
    const meds   = activeMedsForDate(dt);
    const cls    = ['cal-cell', isT && 'today', isSel && 'selected']
                     .filter(Boolean).join(' ');

    const dots = meds.slice(0, 5).map(m =>
      `<span style="background:${m.color}"></span>`).join('');

    html += `
      <div class="${cls}" onclick="window.txSelectDate(${calYear},${calMonth},${d})">
        <span class="cal-num">${d}</span>
        <div class="cal-dots">${dots}</div>
      </div>`;
  }

  grid.innerHTML = html;
}

function activeMedsForDate(dt) {
  const ms = dt.getTime();
  return treatments.filter(m => {
    const s = m.start_date ? new Date(m.start_date + 'T00:00:00').getTime() : 0;
    const e = m.end_date   ? new Date(m.end_date   + 'T00:00:00').getTime() : Infinity;
    if (ms < s || ms > e) return false;

    // Frequency gating
    if (m.frequency === 'weekly') {
      // Only show on the same day of week as the start date
      const startDow = new Date(m.start_date + 'T00:00:00').getDay();
      return dt.getDay() === startDow;
    }

    if (m.frequency === 'as_needed') {
      // Only show if a log entry exists for this day — don't pre-populate calendar
      return false;
    }

    // daily, twice_daily, three_times — show every day in range
    return true;
  });
}

/* ─── Checklist ─────────────────────────────────────────── */
async function renderChecklist(dt) {
  const ds     = isoDate(dt);
  const today  = new Date();
  const isT    = dt.toDateString() === today.toDateString();

   // Title + date label
  document.getElementById('chkDayTitle').textContent =
    isT ? "Today's Schedule"
        : `Schedule — ${dt.toLocaleDateString('en-US',{month:'long',day:'numeric'})}`;
  document.getElementById('chkDateLabel').textContent =
    dt.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const meds = activeMedsForDate(dt);
  const prog = document.getElementById('txProgress');
  const list = document.getElementById('chkList');

  if (!meds.length) {
    prog.style.display = 'none';
    list.innerHTML = `
      <div class="tx-empty">
        <div class="tx-empty-icon"> 𓆉 𓆝 𓆡</div>
        No medications scheduled for this day.
      </div>`;
    return;
  }

    // Fetch logs for this date (cached)
  if (!logsCache[ds]) {
    try {
      const r = await fetch(`${pythonURI}/api/treatment/log?date=${ds}`, fetchOptions);
      logsCache[ds] = r.ok ? await r.json() : [];
    } catch (_) { logsCache[ds] = []; }
  }
  const logs = logsCache[ds];

  // Flatten (med × time) → items
  const items = [];
  meds.forEach(m => {
    const times = m.times && m.times.length ? m.times : ['anytime'];
    times.forEach(ts => {
      const log = logs.find(l => l.treatment_id === m.id && l.time_slot === ts);
      items.push({ m, ts, taken: log?.taken ?? false });
    });
  });

  // Sort by time
  items.sort((a, b) => {
    if (a.ts === 'anytime') return 1;
    if (b.ts === 'anytime') return -1;
    return a.ts.localeCompare(b.ts);
  });

  const takenN = items.filter(i => i.taken).length;
  prog.style.display = 'flex';
  document.getElementById('txProgressFill').style.width =
    items.length ? `${(takenN / items.length) * 100}%` : '0%';
  document.getElementById('txProgressCount').textContent =
    `${takenN} / ${items.length}`;

  list.innerHTML = items.map((item, idx) => `
    <div class="chk-item ${item.taken ? 'taken' : ''}"
         onclick="window.txToggle(${idx})"
         data-idx="${idx}">
      <div class="chk-box">${item.taken ? '' : ''}</div>
      <div class="chk-info">
        <div class="chk-name">${esc(item.m.medication_name)}</div>
        <div class="chk-time">${item.m.dosage ? esc(item.m.dosage) + ' · ' : ''}${fmtTime(item.ts)}</div>
      </div>
      <div class="chk-dot" style="background:${item.m.color}"></div>
    </div>`).join('');

// Store items for toggle handler
  window._txItems = items;
  window._txDate  = ds;
}

/* ─── Modal helpers ─────────────────────────────────────── */
function buildSwatches() {
  document.getElementById('fSwatches').innerHTML =
    PALETTE.map(c => `
      <div class="swatch ${c === chosenColor ? 'active' : ''}"
           style="background:${c}"
           data-c="${c}"
           onclick="window.txPickColor('${c}')"></div>`).join('');
}

function resetModal() {
  chosenTimes = [];
  chosenColor = PALETTE[0];
  document.getElementById('fMedName').value = '';
  document.getElementById('fDosage').value  = '';
  document.getElementById('fFreq').value    = 'daily';
  document.getElementById('fNotes').value   = '';
  document.getElementById('fEnd').value     = '';
  document.getElementById('fStart').value   = isoDate(new Date());
  document.getElementById('aiDesc').textContent = '';
  document.getElementById('aiDesc').classList.remove('visible');
  document.getElementById('aiLoading').classList.remove('visible');
  document.getElementById('timesChips').innerHTML = '';
  buildSwatches();
}

function renderTimesChips() {
  document.getElementById('timesChips').innerHTML =
    chosenTimes.map((t, i) => `
      <div class="t-chip">
        ${fmtTime(t)}
        <button onclick="window.txRemoveTime(${i})"></button>
      </div>`).join('');
}

/* ─── Global window API ──────────────────────────────────── */
window.txOpenAdd = function () {
  editingId = null;
  resetModal();
  document.getElementById('modalHeading').textContent = 'Add Medication';
  document.getElementById('txOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fMedName').focus(), 100);
};

window.txOpenEdit = function (id) {
  const m = treatments.find(t => t.id === id);
  if (!m) return;
  editingId = id;
  resetModal();

  document.getElementById('modalHeading').textContent = 'Edit Medication';
  document.getElementById('fMedName').value = m.medication_name;
  document.getElementById('fDosage').value  = m.dosage  || '';
  document.getElementById('fFreq').value    = m.frequency || 'daily';
  document.getElementById('fNotes').value   = m.notes   || '';
  document.getElementById('fStart').value   = m.start_date || isoDate(new Date());
  document.getElementById('fEnd').value     = m.end_date   || '';

  chosenTimes = [...(m.times || [])];
  chosenColor = m.color || PALETTE[0];
  renderTimesChips();
  buildSwatches();

  if (m.ai_description) {
    const box = document.getElementById('aiDesc');
    box.textContent = m.ai_description;
    box.classList.add('visible');
  }

  document.getElementById('txOverlay').classList.add('open');
};

window.txCloseModal = function () {
  document.getElementById('txOverlay').classList.remove('open');
};

window.txPickColor = function (c) {
  chosenColor = c;
  buildSwatches();
};

window.txAddTime = function () {
  const val = document.getElementById('fTimeInput').value;
  if (!val || chosenTimes.includes(val)) return;
  chosenTimes.push(val);
  chosenTimes.sort();
  renderTimesChips();
  document.getElementById('fTimeInput').value = '';
};

window.txRemoveTime = function (idx) {
  chosenTimes.splice(idx, 1);
  renderTimesChips();
};

window.txSelectDate = function (y, mo, d) {
  selectedDate = new Date(y, mo, d);
  renderCalendar();
  renderChecklist(selectedDate);
  /* notify notes tab */
  window._tnDateChanged && window._tnDateChanged(selectedDate);
};

window.txChangeMonth = function (dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
};

window.txToggle = async function (idx) {
  const item = window._txItems[idx];
  const ds   = window._txDate;
  const nowTaken = !item.taken;

  try {
    const r = await fetch(`${pythonURI}/api/treatment/log`, {
      ...fetchOptions,
      method: 'POST',
      body: JSON.stringify({
        treatment_id: item.m.id,
        date:      ds,
        time_slot: item.ts,
        taken:     nowTaken,
      }),
    });
    if (r.ok) {
      delete logsCache[ds];
      await renderChecklist(selectedDate);
      renderCalendar();
    }
  } catch (e) { console.error(e); }
};

window.txSave = async function () {
  const name = document.getElementById('fMedName').value.trim();
  if (!name) {
    document.getElementById('fMedName').focus();
    return;
  }

  const btn = document.getElementById('fSubmit');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const aiText = document.getElementById('aiDesc').textContent || '';
  const body = {
    medication_name: name,
    dosage:         document.getElementById('fDosage').value.trim(),
    frequency:      document.getElementById('fFreq').value,
    times:          chosenTimes,
    color:          chosenColor,
    notes:          document.getElementById('fNotes').value.trim(),
    ai_description: aiText,
    start_date:     document.getElementById('fStart').value || isoDate(new Date()),
    end_date:       document.getElementById('fEnd').value   || null,
  };

  try {
    const method = editingId ? 'PUT' : 'POST';
    if (editingId) body.id = editingId;

    const r = await fetch(`${pythonURI}/api/treatments`, {
      ...fetchOptions, method,
      body: JSON.stringify(body),
    });

    if (r.ok) {
      txCloseModal();
      logsCache = {};
      await loadTreatments();
      renderCalendar();
      await renderChecklist(selectedDate);
    } else {
      alert('Could not save medication. Please try again.');
    }
  } catch (e) {
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = 'Save Medication';
};

window.txDelete = async function (id) {
  const med = treatments.find(t => t.id === id);
  if (!med) return;
  if (!confirm(`Remove "${med.medication_name}" from your treatment plan?`)) return;

  try {
    const r = await fetch(`${pythonURI}/api/treatments`, {
      ...fetchOptions, method: 'DELETE',
      body: JSON.stringify({ id }),
    });
    if (r.ok) {
      logsCache = {};
      await loadTreatments();
      renderCalendar();
      await renderChecklist(selectedDate);
    }
  } catch (e) { console.error(e); }
};

/* ─── AI Medication Lookup ──────────────────────────────── */
window.txLookupNow = function () {
  const val = document.getElementById('fMedName').value.trim();
  if (!val || val.length < 2) return;
  doLookup(val);
};

async function doLookup(name) {
  const box  = document.getElementById('aiDesc');
  const spin = document.getElementById('aiLoading');
  spin.classList.add('visible');
  box.classList.remove('visible');

  try {
    const r = await fetch(
      `${pythonURI}/api/medication/info?name=${encodeURIComponent(name)}`,
      fetchOptions
    );
    if (r.ok) {
      const d = await r.json();
      box.textContent = d.description || '';
      if (d.description) box.classList.add('visible');
    }
  } catch (_) {
    box.textContent = 'Unable to fetch medication information.';
    box.classList.add('visible');
  }

  spin.classList.remove('visible');
}

/* ─── Utilities ─────────────────────────────────────────── */
function isoDate(dt) {
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(t) {
  if (!t || t === 'anytime') return 'As Needed';
  const [h, m] = t.split(':').map(Number);
  return `${h % 12 || 12}:${pad(m)} ${h >= 12 ? 'PM' : 'AM'}`;
}
function fmtFreq(f) {
  return { daily:'Daily', twice_daily:'Twice Daily', three_times:'3× Daily',
           weekly:'Weekly', as_needed:'As Needed' }[f] || f;
}
</script>

<!-- ═══════════════════════════════════════════════════════════
     TREATMENT NOTES — inline tab script
     Uses window._txPythonURI + window._txFetchOptions
     exposed by the module script above.
═══════════════════════════════════════════════════════════ -->
<script>
const TN_CATS = [
  { key:'general',     label:'General'     },
  { key:'side_effect', label:'Side Effect' },
  { key:'reminder',    label:'Reminder'    },
  { key:'dosage',      label:'Dosage'      },
  { key:'symptom',     label:'Symptom'     },
];

let _tnDate    = _tnIsoToday();
let _tnNotes   = [];
let _tnCat     = 'general';
let _tnFilter  = 'all';
let _tnInited  = false;

/* ── Tab switching ── */
window.tnSwitchTab = function(tab) {
  document.getElementById('tabScheduleBtn').classList.toggle('active', tab === 'schedule');
  document.getElementById('tabNotesBtn').classList.toggle('active',   tab === 'notes');
  document.getElementById('paneSchedule').classList.toggle('active',  tab === 'schedule');
  document.getElementById('paneNotes').classList.toggle('active',     tab === 'notes');

  if (tab === 'notes') {
    _tnInited = true;
    _tnRefreshMeds();
    _tnBuildCats();
    _tnBuildFilters();
    _tnLoad();
  }
};

/* ── Called by the module script when the calendar date changes ── */
window._tnDateChanged = function(dt) {
  _tnDate = _tnIsoFrom(dt);
  const label = dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const el = document.getElementById('tnFormDate');
  if (el) el.textContent = 'Notes for ' + label;
  if (_tnInited) _tnLoad();
  _tnSilentBadge();
};

/* ── Medication dropdown ── */
function _tnRefreshMeds() {
  const sel  = document.getElementById('tnMedSel');
  const meds = window._txTreatments || [];
  sel.innerHTML = '<option value="">Day note (no specific medication)</option>';
  meds.forEach(m => {
    const o = document.createElement('option');
    o.value = m.id;
    o.textContent = m.medication_name + (m.dosage ? ' (' + m.dosage + ')' : '');
    sel.appendChild(o);
  });
}

/* ── Category chips ── */
function _tnBuildCats() {
  document.getElementById('tnCatRow').innerHTML = TN_CATS.map(c =>
    `<div class="tn-cat-chip${c.key === _tnCat ? ' active' : ''}"
          onclick="_tnPickCat('${c.key}')">${c.label}</div>`
  ).join('');
}
window._tnPickCat = function(key) { _tnCat = key; _tnBuildCats(); };

/* ── Filter buttons ── */
function _tnBuildFilters() {
  const opts = [{ key:'all', label:'All' }, ...TN_CATS];
  document.getElementById('tnFilterRow').innerHTML = opts.map(c =>
    `<button class="tn-f-btn${c.key === _tnFilter ? ' active' : ''}"
             onclick="_tnSetFilter('${c.key}')">${c.label}</button>`
  ).join('');
}
window._tnSetFilter = function(key) { _tnFilter = key; _tnBuildFilters(); _tnRender(); };

/* ── Fetch notes ── */
function _tnApi() {
  return window._txPythonURI + '/api/treatment/notes';
}
function _tnFetchOpts(extra) {
  const base = window._txFetchOptions;
  return Object.assign({}, base, extra);
}

async function _tnLoad() {
  document.getElementById('tnList').innerHTML =
    '<div class="tn-empty-note"><div class="tn-empty-note-icon"></div>Loading...</div>';
  try {
    const r = await fetch(`${_tnApi()}?date=${_tnDate}`,
                          _tnFetchOpts({ method:'GET' }));
    _tnNotes = r.ok ? await r.json() : [];
  } catch(_) { _tnNotes = []; }
  _tnUpdateBadge();
  _tnRender();
}

async function _tnSilentBadge() {
  try {
    const r = await fetch(`${_tnApi()}?date=${_tnDate}`,
                          _tnFetchOpts({ method:'GET' }));
    const notes = r.ok ? await r.json() : [];
    _tnNotes = notes;
    _tnUpdateBadge();
  } catch(_) {}
}

/* ── Render ── */
function _tnRender() {
  const list = document.getElementById('tnList');
  const meds = window._txTreatments || [];
  let shown  = _tnFilter === 'all' ? _tnNotes : _tnNotes.filter(n => n.category === _tnFilter);

  if (!shown.length) {
    list.innerHTML = `<div class="tn-empty-note"><div class="tn-empty-note-icon"></div>
      No${_tnFilter !== 'all' ? ' ' + _tnFilter.replace('_',' ') : ''} notes for this day yet.</div>`;
    return;
  }

  list.innerHTML = shown.map(n => {
    const med = meds.find(m => m.id === n.treatment_id);
    const cat = TN_CATS.find(c => c.key === n.category) || TN_CATS[0];
    const raw = n.created_at || '';
    const ts  = raw ? new Date(raw.endsWith('Z') ? raw : raw + 'Z')
                        .toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '';
    return `
      <div class="tn-note" data-cat="${n.category||'general'}">
        <span class="tn-note-badge ${n.category||'general'}">${cat.label}</span>
        ${med ? `<div class="tn-note-med">${_tnEsc(med.medication_name)}</div>` : ''}
        <div class="tn-note-text">${_tnEsc(n.content)}</div>
        ${ts ? `<div class="tn-note-time">${ts}</div>` : ''}
        <button class="tn-del" onclick="_tnDel(${n.id})" title="Delete note">x</button>
      </div>`;
  }).join('');
}

/* ── Save ── */
window.tnSave = async function() {
  const content = document.getElementById('tnText').value.trim();
  const status  = document.getElementById('tnStatus');
  const btn     = document.getElementById('tnSaveBtn');

  if (!content) {
    document.getElementById('tnText').focus();
    status.textContent = 'Please write something first.';
    status.className = 'tn-status err';
    return;
  }

  const tid = document.getElementById('tnMedSel').value;
  btn.disabled = true; btn.textContent = 'Saving…';
  status.textContent = ''; status.className = 'tn-status';

  try {
    const r = await fetch(_tnApi(), _tnFetchOpts({
      method: 'POST',
      body: JSON.stringify({
        content,
        date:         _tnDate,
        treatment_id: tid ? parseInt(tid) : null,
        category:     _tnCat,
      }),
    }));

    if (r.ok) {
      document.getElementById('tnText').value = '';
      status.textContent = 'Note saved!';
      status.className = 'tn-status';
      await _tnLoad();
      setTimeout(() => { status.textContent = ''; }, 2500);
    } else {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || 'Server ' + r.status);
    }
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'tn-status err';
  }

  btn.disabled = false; btn.textContent = 'Save Note';
};

/* ── Delete ── */
window._tnDel = async function(id) {
  if (!confirm('Delete this note?')) return;
  try {
    const r = await fetch(`${_tnApi()}/${id}`, _tnFetchOpts({ method:'DELETE' }));
    if (r.ok) await _tnLoad();
  } catch(_) {}
};

/* ── Badge ── */
function _tnUpdateBadge() {
  const b = document.getElementById('tnBadge');
  if (!b) return;
  if (_tnNotes.length) { b.textContent = _tnNotes.length; b.classList.add('show'); }
  else                 { b.classList.remove('show'); }
}

/* ── Utilities ── */
function _tnIsoToday() { return _tnIsoFrom(new Date()); }
function _tnIsoFrom(dt) {
  const p = n => String(n).padStart(2,'0');
  return `${dt.getFullYear()}-${p(dt.getMonth()+1)}-${p(dt.getDate())}`;
}
function _tnEsc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init: silent badge load for today ── */
document.addEventListener('DOMContentLoaded', () => {
  setTimeout(_tnSilentBadge, 2000);
});
</script>
