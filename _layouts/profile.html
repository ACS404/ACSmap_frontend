---
layout: opencs
title: Treatment Tracker
---

<style>
/* ═══════════════════════════════════════════════════════════
   TREATMENT TRACKER  —  ACS warm palette
   All colours reference the CSS variables from theme.scss
═══════════════════════════════════════════════════════════ */

/* ── Page wrapper ── */
.tx-app {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 72px;
}

/* ── Page header ── */
.tx-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
  padding: 28px 0 22px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 28px;
}
.tx-header-left {}
.tx-page-title {
  font-family: var(--serif) !important;
  font-size: 34px !important;
  font-weight: 600;
  color: var(--text-main) !important;
  margin: 0;
  line-height: 1.1;
}
.tx-page-sub {
  color: var(--text-muted);
  font-size: 14px;
  margin-top: 5px;
}
.tx-add-btn {
  background: var(--rose);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 12px 24px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(224,122,106,0.3);
  flex-shrink: 0;
}
.tx-add-btn:hover {
  background: var(--terracotta);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(196,94,74,0.35);
}

/* ── Two-column grid ── */
.tx-grid {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 24px;
  align-items: start;
}
@media (max-width: 820px) {
  .tx-grid { grid-template-columns: 1fr; }
}

/* ── Card base ── */
.tx-card {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(61,44,36,0.05);
}
.tx-card + .tx-card { margin-top: 20px; }

.tx-section-title {
  font-family: var(--serif);
  font-size: 19px;
  font-weight: 600;
  color: var(--text-main);
  margin: 0 0 4px;
}

/* ═══════════════════════════════════
   CALENDAR
═══════════════════════════════════ */
.cal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.cal-month-label {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 600;
  color: var(--text-main);
}
.cal-nav-btn {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 13px;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-main);
  transition: background 0.15s, border-color 0.15s;
  line-height: 1;
}
.cal-nav-btn:hover {
  background: var(--tan-light);
  border-color: var(--tan);
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-dow {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 5px 0 8px;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 6px 2px 3px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.12s;
  min-width: 0;
  position: relative;
}
.cal-cell:hover { background: var(--rose-pale); }
.cal-cell.empty  { cursor: default; pointer-events: none; }
.cal-cell.empty:hover { background: transparent; }
.cal-cell.today {
  background: var(--rose-pale);
}
.cal-cell.today .cal-num {
  color: var(--terracotta);
  font-weight: 800;
}
.cal-cell.selected {
  background: var(--rose) !important;
}
.cal-cell.selected .cal-num { color: white; font-weight: 700; }
.cal-cell.selected .cal-dots span { background: rgba(255,255,255,0.6) !important; }

.cal-num {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-main);
  line-height: 1;
  margin-bottom: 3px;
}
.cal-dots {
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: center;
}
.cal-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  display: block;
}

/* ═══════════════════════════════════
   MEDICATIONS LIST
═══════════════════════════════════ */
.meds-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.meds-count {
  font-size: 12px;
  color: var(--text-muted);
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
}
.med-item {
  display: flex;
  align-items: center;
  gap: 13px;
  padding: 14px 16px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 13px;
  margin-bottom: 8px;
  transition: box-shadow 0.15s, transform 0.12s;
}
.med-item:hover {
  box-shadow: 0 4px 16px rgba(61,44,36,0.08);
  transform: translateY(-1px);
}
.med-color-strip {
  width: 5px;
  align-self: stretch;
  border-radius: 4px;
  flex-shrink: 0;
}
.med-info { flex: 1; min-width: 0; }
.med-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.med-detail {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.med-actions { display: flex; gap: 6px; flex-shrink: 0; }
.med-btn {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 5px 9px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.12s, border-color 0.12s;
}
.med-btn:hover { background: var(--tan-light); border-color: var(--tan); }
.med-btn.del:hover {
  background: var(--rose-pale);
  border-color: var(--rose-light);
  color: var(--terracotta);
}

/* ═══════════════════════════════════
   RIGHT COLUMN: DAILY CHECKLIST
═══════════════════════════════════ */
.checklist-day-header {
  margin-bottom: 2px;
}
.checklist-date-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 14px;
}

/* Progress bar */
.tx-progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 14px;
}
.tx-progress-bar {
  flex: 1;
  height: 7px;
  background: var(--tan-light);
  border-radius: 4px;
  overflow: hidden;
}
.tx-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--sage), #6aaa6e);
  border-radius: 4px;
  transition: width 0.4s ease;
}
.tx-progress-count {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-main);
  flex-shrink: 0;
  min-width: 40px;
  text-align: right;
}

/* Checklist item */
.chk-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 12px 13px;
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  user-select: none;
}
.chk-item:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(61,44,36,0.07); }
.chk-item:active { transform: translateY(0); }
.chk-item.taken {
  background: var(--sage-pale) !important;
  border-color: var(--sage-light) !important;
}
.chk-item.taken .chk-name {
  text-decoration: line-through;
  color: var(--text-muted);
}

.chk-box {
  width: 22px; height: 22px;
  border: 2px solid var(--tan-light);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all 0.15s;
  flex-shrink: 0;
  color: white;
}
.chk-item.taken .chk-box {
  background: var(--sage);
  border-color: var(--sage);
}

.chk-info { flex: 1; min-width: 0; }
.chk-name  {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-main);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.chk-time {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}
.chk-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Empty state */
.tx-empty {
  text-align: center;
  padding: 28px 12px;
  color: var(--text-muted);
  font-size: 14px;
  line-height: 1.6;
}
.tx-empty-icon { font-size: 30px; margin-bottom: 10px; }

/* ═══════════════════════════════════
   MODAL OVERLAY
═══════════════════════════════════ */
.tx-overlay {
  position: fixed; inset: 0;
  background: rgba(61,44,36,0.6);
  backdrop-filter: blur(8px);
  z-index: 9200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.tx-overlay.open { opacity: 1; pointer-events: auto; }

.tx-modal {
  background: var(--warm-white);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px;
  max-width: 530px;
  width: 100%;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 24px 72px rgba(61,44,36,0.2);
  transform: scale(0.95) translateY(10px);
  transition: transform 0.2s;
}
.tx-overlay.open .tx-modal { transform: scale(1) translateY(0); }

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.modal-title {
  font-family: var(--serif);
  font-size: 25px;
  font-weight: 600;
  color: var(--text-main);
}
.modal-close {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 33px; height: 33px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  color: var(--text-muted);
  transition: all 0.15s;
  flex-shrink: 0;
}
.modal-close:hover { background: var(--rose-pale); border-color: var(--rose-light); color: var(--rose); }

/* Form fields */
.f-group { margin-bottom: 16px; }
.f-label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 5px;
}
.f-input,
.f-select,
.f-textarea {
  width: 100%;
  box-sizing: border-box;
  background: var(--cream);
  color: var(--text-main);
  border: 1px solid var(--tan-light);
  border-radius: 10px;
  padding: 11px 14px;
  font-family: var(--sans);
  font-size: 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.f-input:focus,
.f-select:focus,
.f-textarea:focus {
  outline: none;
  border-color: var(--rose);
  box-shadow: 0 0 0 3px rgba(224,122,106,0.13);
}
.f-textarea { resize: vertical; }
.f-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

/* AI description */
.ai-desc {
  background: var(--rose-pale);
  border: 1px solid var(--rose-light);
  border-radius: 10px;
  padding: 11px 14px;
  font-size: 13px;
  color: var(--text-main);
  line-height: 1.65;
  margin-top: 8px;
  display: none;
}
.ai-desc.visible { display: block; }
.ai-loading {
  display: none;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 8px;
}
.ai-loading.visible { display: flex; }
.ai-spin {
  width: 14px; height: 14px;
  border: 2px solid var(--tan-light);
  border-top-color: var(--rose);
  border-radius: 50%;
  animation: txspin 0.7s linear infinite;
}
@keyframes txspin { to { transform: rotate(360deg); } }

/* Times */
.times-chips {
  display: flex; flex-wrap: wrap; gap: 7px;
  margin-bottom: 8px;
}
.t-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--rose-pale);
  border: 1px solid var(--rose-light);
  border-radius: 20px;
  padding: 5px 11px;
  font-size: 13px;
  font-weight: 500;
  color: var(--terracotta);
}
.t-chip button {
  background: none; border: none;
  cursor: pointer; color: var(--terracotta);
  font-size: 14px; padding: 0; line-height: 1; opacity: 0.7;
}
.t-chip button:hover { opacity: 1; }
.time-add-row {
  display: flex; gap: 8px; align-items: center;
}
.time-input {
  flex: 1;
  background: var(--cream);
  border: 1px solid var(--tan-light);
  border-radius: 8px;
  padding: 9px 12px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text-main);
}
.time-input:focus { outline: none; border-color: var(--rose); }
.time-add-btn {
  background: var(--rose);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 9px 16px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  transition: background 0.15s;
}
.time-add-btn:hover { background: var(--terracotta); }

/* Color swatches */
.swatches {
  display: flex; gap: 9px; flex-wrap: wrap;
  margin-top: 6px;
}
.swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 3px solid transparent;
  transition: border-color 0.12s, transform 0.12s;
}
.swatch.active { border-color: var(--text-main); transform: scale(1.15); }

/* Modal submit */
.f-submit {
  width: 100%;
  background: var(--rose);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.12s;
  margin-top: 10px;
  box-shadow: 0 4px 14px rgba(224,122,106,0.3);
}
.f-submit:hover { background: var(--terracotta); transform: translateY(-1px); }
.f-submit:disabled { background: var(--tan-light); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
</style>

<!-- ═══════════════════════════════════════════════════════════
     PAGE STRUCTURE
═══════════════════════════════════════════════════════════ -->
<div class="tx-app">

  <!-- Header -->
  <div class="tx-header">
    <div class="tx-header-left">
      <h1 class="tx-page-title"> ⚕ Treatment Tracker</h1>
      <div class="tx-page-sub" id="txUserLine">Loading your plan…</div>
    </div>
    <button class="tx-add-btn" onclick="txOpenAdd()">+ Add Medication</button>
  </div>

  <!-- Two-column layout -->
  <div class="tx-grid">

    <!-- ── Left column ── -->
    <div>

      <!-- Calendar card -->
      <div class="tx-card" style="margin-bottom:22px;">
        <div class="cal-head">
          <button class="cal-nav-btn" onclick="txChangeMonth(-1)">‹</button>
          <div class="cal-month-label" id="calLabel"></div>
          <button class="cal-nav-btn" onclick="txChangeMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <!-- Medications list card -->
      <div class="tx-card">
        <div class="meds-header">
          <div class="tx-section-title">My Medications</div>
          <span class="meds-count" id="medsCount" style="display:none;"></span>
        </div>
        <div id="medsList">
          <div class="tx-empty"><div class="tx-empty-icon">⛨</div>Loading…</div>
        </div>
      </div>

    </div><!-- /left -->

    <!-- ── Right column — Daily Checklist ── -->
    <div class="tx-card">
      <div class="checklist-day-header">
        <div class="tx-section-title" id="chkDayTitle">Today's Schedule</div>
      </div>
      <div class="checklist-date-label" id="chkDateLabel"></div>

      <!-- Progress bar (hidden when no meds) -->
      <div class="tx-progress-wrap" id="txProgress" style="display:none;">
        <div class="tx-progress-bar">
          <div class="tx-progress-fill" id="txProgressFill" style="width:0%"></div>
        </div>
        <div class="tx-progress-count" id="txProgressCount">0 / 0</div>
      </div>

      <div id="chkList">
        <div class="tx-empty"><div class="tx-empty-icon">⛨</div>Loading…</div>
      </div>
    </div><!-- /right -->

  </div><!-- /tx-grid -->
</div><!-- /tx-app -->

<!-- ═══════════════════════════════════════════════════════════
     ADD / EDIT MODAL
═══════════════════════════════════════════════════════════ -->
<div class="tx-overlay" id="txOverlay">
  <div class="tx-modal">

    <div class="modal-header">
      <div class="modal-title" id="modalHeading">Add Medication</div>
      <button class="modal-close" onclick="txCloseModal()">✕</button>
    </div>

    <!-- Medication name + AI lookup -->
    <div class="f-group">
      <label class="f-label">Medication Name *</label>
      <input type="text" class="f-input" id="fMedName"
             placeholder="e.g. Metformin, Lisinopril, Aspirin…"
             oninput="txDebounceLookup(this.value)">
      <div class="ai-loading" id="aiLoading">
        <div class="ai-spin"></div> Looking up medication…
      </div>
      <div class="ai-desc" id="aiDesc"></div>
    </div>

    <!-- Dosage + Frequency -->
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Dosage</label>
        <input type="text" class="f-input" id="fDosage" placeholder="e.g. 500 mg">
      </div>
      <div class="f-group">
        <label class="f-label">Frequency</label>
        <select class="f-select" id="fFreq">
          <option value="daily">Daily</option>
          <option value="twice_daily">Twice Daily</option>
          <option value="three_times">3× Daily</option>
          <option value="weekly">Weekly</option>
          <option value="as_needed">As Needed</option>
        </select>
      </div>
    </div>

    <!-- Reminder times -->
    <div class="f-group">
      <label class="f-label">Reminder Times</label>
      <div class="times-chips" id="timesChips"></div>
      <div class="time-add-row">
        <input type="time" class="time-input" id="fTimeInput">
        <button class="time-add-btn" onclick="txAddTime()">＋ Add</button>
      </div>
    </div>

    <!-- Start / End dates -->
    <div class="f-row">
      <div class="f-group">
        <label class="f-label">Start Date</label>
        <input type="date" class="f-input" id="fStart">
      </div>
      <div class="f-group">
        <label class="f-label">End Date (opt.)</label>
        <input type="date" class="f-input" id="fEnd">
      </div>
    </div>

    <!-- Colour -->
    <div class="f-group">
      <label class="f-label">Colour</label>
      <div class="swatches" id="fSwatches"></div>
    </div>

    <!-- Notes -->
    <div class="f-group">
      <label class="f-label">Notes</label>
      <textarea class="f-textarea" id="fNotes" rows="2"
                placeholder="Special instructions, food restrictions, etc."></textarea>
    </div>

    <button class="f-submit" id="fSubmit" onclick="txSave()">Save Medication</button>

  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
═══════════════════════════════════════════════════════════ -->
<script type="module">
import { pythonURI, fetchOptions } from '{{site.baseurl}}/assets/js/api/config.js';

/* ─── Constants ─────────────────────────────────────────── */
const MONTHS  = ['January','February','March','April','May','June',
                 'July','August','September','October','November','December'];
const DOW_ABR = ['Su','Mo','Tu','We','Th','Fr','Sa'];
const PALETTE = ['#e07a6a','#c4a882','#8aaa8c','#6b9ecf',
                 '#c987b8','#e8b86d','#937468','#b8ceb9'];

/* ─── State ─────────────────────────────────────────────── */
let treatments   = [];          // active treatments for this user
let logsCache    = {};          // { 'YYYY-MM-DD': [TreatmentLog, …] }
let selectedDate = new Date();  // currently highlighted calendar date
let calYear      = new Date().getFullYear();
let calMonth     = new Date().getMonth();
let editingId    = null;        // null = add mode, number = edit mode
let chosenTimes  = [];          // time strings in the modal
let chosenColor  = PALETTE[0];  // hex in the modal
let lookupTimer  = null;

/* ─── Boot ──────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', async () => {
  await loadUser();
  await loadTreatments();
  renderCalendar();
  await renderChecklist(selectedDate);
  buildSwatches();
  document.getElementById('fStart').value = isoDate(new Date());

  // Close modal on overlay click
  document.getElementById('txOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('txOverlay')) txCloseModal();
  });
});

/* ─── User info ─────────────────────────────────────────── */
async function loadUser() {
  try {
    const r = await fetch(`${pythonURI}/api/id`, fetchOptions);
    if (r.ok) {
      const d = await r.json();
      document.getElementById('txUserLine').textContent =
        `${d.name}'s personal treatment plan`;
    }
  } catch (_) {}
}

/* ─── Treatments ────────────────────────────────────────── */
async function loadTreatments() {
  try {
    const r = await fetch(`${pythonURI}/api/treatments`, fetchOptions);
    treatments = r.ok ? await r.json() : [];
  } catch (_) { treatments = []; }
  renderMedsList();
}

function renderMedsList() {
  const el     = document.getElementById('medsList');
  const badge  = document.getElementById('medsCount');

  if (!treatments.length) {
    badge.style.display = 'none';
    el.innerHTML = `
      <div class="tx-empty">
        <div class="tx-empty-icon">💊</div>
        No medications added yet.<br>
        Click <strong>+ Add Medication</strong> to start tracking.
      </div>`;
    return;
  }

  badge.style.display = 'inline-block';
  badge.textContent   = `${treatments.length} active`;

  el.innerHTML = treatments.map(m => `
    <div class="med-item">
      <div class="med-color-strip" style="background:${m.color}"></div>
      <div class="med-info">
        <div class="med-name">${esc(m.medication_name)}</div>
        <div class="med-detail">
          ${m.dosage ? esc(m.dosage) + ' &middot; ' : ''}
          ${fmtFreq(m.frequency)}
          ${m.times && m.times.length ? ' &middot; ' + m.times.map(fmtTime).join(', ') : ''}
        </div>
      </div>
      <div class="med-actions">
        <button class="med-btn"     title="Edit"   onclick="window.txOpenEdit(${m.id})">✏️</button>
        <button class="med-btn del" title="Remove" onclick="window.txDelete(${m.id})">🗑️</button>
      </div>
    </div>`).join('');
}

/* ─── Calendar ──────────────────────────────────────────── */
function renderCalendar() {
  document.getElementById('calLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;

  const grid    = document.getElementById('calGrid');
  const today   = new Date();
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const daysInM  = new Date(calYear, calMonth + 1, 0).getDate();

  // Build header row
  let html = DOW_ABR.map(d =>
    `<div class="cal-dow">${d}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInM; d++) {
    const dt     = new Date(calYear, calMonth, d);
    const isT    = dt.toDateString() === today.toDateString();
    const isSel  = dt.toDateString() === selectedDate.toDateString();
    const meds   = activeMedsForDate(dt);
    const cls    = ['cal-cell', isT && 'today', isSel && 'selected']
                     .filter(Boolean).join(' ');

    const dots = meds.slice(0, 5).map(m =>
      `<span style="background:${m.color}"></span>`).join('');

    html += `
      <div class="${cls}" onclick="window.txSelectDate(${calYear},${calMonth},${d})">
        <span class="cal-num">${d}</span>
        <div class="cal-dots">${dots}</div>
      </div>`;
  }

  grid.innerHTML = html;
}

function activeMedsForDate(dt) {
  const ms = dt.getTime();
  return treatments.filter(m => {
    const s = m.start_date ? new Date(m.start_date + 'T00:00:00').getTime() : 0;
    const e = m.end_date   ? new Date(m.end_date   + 'T00:00:00').getTime() : Infinity;
    return ms >= s && ms <= e;
  });
}

/* ─── Checklist ─────────────────────────────────────────── */
async function renderChecklist(dt) {
  const ds     = isoDate(dt);
  const today  = new Date();
  const isT    = dt.toDateString() === today.toDateString();

  // Title + date label
  document.getElementById('chkDayTitle').textContent =
    isT ? "Today's Schedule"
        : `Schedule — ${dt.toLocaleDateString('en-US',{month:'long',day:'numeric'})}`;
  document.getElementById('chkDateLabel').textContent =
    dt.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  const meds = activeMedsForDate(dt);
  const prog = document.getElementById('txProgress');
  const list = document.getElementById('chkList');

  if (!meds.length) {
    prog.style.display = 'none';
    list.innerHTML = `
      <div class="tx-empty">
        <div class="tx-empty-icon">🌿</div>
        No medications scheduled for this day.
      </div>`;
    return;
  }

  // Fetch logs for this date (cached)
  if (!logsCache[ds]) {
    try {
      const r = await fetch(`${pythonURI}/api/treatment/log?date=${ds}`, fetchOptions);
      logsCache[ds] = r.ok ? await r.json() : [];
    } catch (_) { logsCache[ds] = []; }
  }
  const logs = logsCache[ds];

  // Flatten (med × time) → items
  const items = [];
  meds.forEach(m => {
    const times = m.times && m.times.length ? m.times : ['anytime'];
    times.forEach(ts => {
      const log = logs.find(l => l.treatment_id === m.id && l.time_slot === ts);
      items.push({ m, ts, taken: log?.taken ?? false });
    });
  });

  // Sort by time
  items.sort((a, b) => {
    if (a.ts === 'anytime') return 1;
    if (b.ts === 'anytime') return -1;
    return a.ts.localeCompare(b.ts);
  });

  const takenN = items.filter(i => i.taken).length;
  prog.style.display = 'flex';
  document.getElementById('txProgressFill').style.width =
    items.length ? `${(takenN / items.length) * 100}%` : '0%';
  document.getElementById('txProgressCount').textContent =
    `${takenN} / ${items.length}`;

  list.innerHTML = items.map((item, idx) => `
    <div class="chk-item ${item.taken ? 'taken' : ''}"
         onclick="window.txToggle(${idx})"
         data-idx="${idx}">
      <div class="chk-box">${item.taken ? '✓' : ''}</div>
      <div class="chk-info">
        <div class="chk-name">${esc(item.m.medication_name)}</div>
        <div class="chk-time">${item.m.dosage ? esc(item.m.dosage) + ' · ' : ''}${fmtTime(item.ts)}</div>
      </div>
      <div class="chk-dot" style="background:${item.m.color}"></div>
    </div>`).join('');

  // Store items for toggle handler
  window._txItems = items;
  window._txDate  = ds;
}

/* ─── Modal helpers ─────────────────────────────────────── */
function buildSwatches() {
  document.getElementById('fSwatches').innerHTML =
    PALETTE.map(c => `
      <div class="swatch ${c === chosenColor ? 'active' : ''}"
           style="background:${c}"
           data-c="${c}"
           onclick="window.txPickColor('${c}')"></div>`).join('');
}

function resetModal() {
  chosenTimes = [];
  chosenColor = PALETTE[0];
  document.getElementById('fMedName').value = '';
  document.getElementById('fDosage').value  = '';
  document.getElementById('fFreq').value    = 'daily';
  document.getElementById('fNotes').value   = '';
  document.getElementById('fEnd').value     = '';
  document.getElementById('fStart').value   = isoDate(new Date());
  document.getElementById('aiDesc').textContent = '';
  document.getElementById('aiDesc').classList.remove('visible');
  document.getElementById('aiLoading').classList.remove('visible');
  document.getElementById('timesChips').innerHTML = '';
  buildSwatches();
}

function renderTimesChips() {
  document.getElementById('timesChips').innerHTML =
    chosenTimes.map((t, i) => `
      <div class="t-chip">
        ${fmtTime(t)}
        <button onclick="window.txRemoveTime(${i})">✕</button>
      </div>`).join('');
}

/* ─── Global window API (called from HTML onclick) ───────── */
window.txOpenAdd = function () {
  editingId = null;
  resetModal();
  document.getElementById('modalHeading').textContent = 'Add Medication';
  document.getElementById('txOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fMedName').focus(), 100);
};

window.txOpenEdit = function (id) {
  const m = treatments.find(t => t.id === id);
  if (!m) return;
  editingId = id;
  resetModal();

  document.getElementById('modalHeading').textContent = 'Edit Medication';
  document.getElementById('fMedName').value = m.medication_name;
  document.getElementById('fDosage').value  = m.dosage  || '';
  document.getElementById('fFreq').value    = m.frequency || 'daily';
  document.getElementById('fNotes').value   = m.notes   || '';
  document.getElementById('fStart').value   = m.start_date || isoDate(new Date());
  document.getElementById('fEnd').value     = m.end_date   || '';

  chosenTimes = [...(m.times || [])];
  chosenColor = m.color || PALETTE[0];
  renderTimesChips();
  buildSwatches();

  if (m.ai_description) {
    const box = document.getElementById('aiDesc');
    box.textContent = m.ai_description;
    box.classList.add('visible');
  }

  document.getElementById('txOverlay').classList.add('open');
};

window.txCloseModal = function () {
  document.getElementById('txOverlay').classList.remove('open');
};

window.txPickColor = function (c) {
  chosenColor = c;
  buildSwatches();
};

window.txAddTime = function () {
  const val = document.getElementById('fTimeInput').value;
  if (!val || chosenTimes.includes(val)) return;
  chosenTimes.push(val);
  chosenTimes.sort();
  renderTimesChips();
  document.getElementById('fTimeInput').value = '';
};

window.txRemoveTime = function (idx) {
  chosenTimes.splice(idx, 1);
  renderTimesChips();
};

window.txSelectDate = function (y, mo, d) {
  selectedDate = new Date(y, mo, d);
  renderCalendar();
  renderChecklist(selectedDate);
};

window.txChangeMonth = function (dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
};

window.txToggle = async function (idx) {
  const item = window._txItems[idx];
  const ds   = window._txDate;
  const nowTaken = !item.taken;

  try {
    const r = await fetch(`${pythonURI}/api/treatment/log`, {
      ...fetchOptions,
      method: 'POST',
      body: JSON.stringify({
        treatment_id: item.m.id,
        date:      ds,
        time_slot: item.ts,
        taken:     nowTaken,
      }),
    });
    if (r.ok) {
      delete logsCache[ds]; // bust cache for this date
      await renderChecklist(selectedDate);
      renderCalendar();      // refresh dots
    }
  } catch (e) { console.error(e); }
};

window.txSave = async function () {
  const name = document.getElementById('fMedName').value.trim();
  if (!name) {
    document.getElementById('fMedName').focus();
    return;
  }

  const btn = document.getElementById('fSubmit');
  btn.disabled = true;
  btn.textContent = 'Saving…';

  const aiText = document.getElementById('aiDesc').textContent || '';
  const body = {
    medication_name: name,
    dosage:         document.getElementById('fDosage').value.trim(),
    frequency:      document.getElementById('fFreq').value,
    times:          chosenTimes,
    color:          chosenColor,
    notes:          document.getElementById('fNotes').value.trim(),
    ai_description: aiText,
    start_date:     document.getElementById('fStart').value || isoDate(new Date()),
    end_date:       document.getElementById('fEnd').value   || null,
  };

  try {
    const method = editingId ? 'PUT' : 'POST';
    if (editingId) body.id = editingId;

    const r = await fetch(`${pythonURI}/api/treatments`, {
      ...fetchOptions, method,
      body: JSON.stringify(body),
    });

    if (r.ok) {
      txCloseModal();
      logsCache = {};
      await loadTreatments();
      renderCalendar();
      await renderChecklist(selectedDate);
    } else {
      alert('Could not save medication. Please try again.');
    }
  } catch (e) {
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = 'Save Medication';
};

window.txDelete = async function (id) {
  const med = treatments.find(t => t.id === id);
  if (!med) return;
  if (!confirm(`Remove "${med.medication_name}" from your treatment plan?`)) return;

  try {
    const r = await fetch(`${pythonURI}/api/treatments`, {
      ...fetchOptions, method: 'DELETE',
      body: JSON.stringify({ id }),
    });
    if (r.ok) {
      logsCache = {};
      await loadTreatments();
      renderCalendar();
      await renderChecklist(selectedDate);
    }
  } catch (e) { console.error(e); }
};

/* ─── AI Medication Lookup ──────────────────────────────── */
window.txDebounceLookup = function (val) {
  clearTimeout(lookupTimer);
  const box  = document.getElementById('aiDesc');
  const spin = document.getElementById('aiLoading');

  if (!val || val.length < 3) {
    box.classList.remove('visible');
    spin.classList.remove('visible');
    return;
  }
  lookupTimer = setTimeout(() => doLookup(val), 750);
};

async function doLookup(name) {
  const box  = document.getElementById('aiDesc');
  const spin = document.getElementById('aiLoading');
  spin.classList.add('visible');
  box.classList.remove('visible');

  try {
    const r = await fetch(
      `${pythonURI}/api/medication/info?name=${encodeURIComponent(name)}`,
      fetchOptions
    );
    if (r.ok) {
      const d = await r.json();
      box.textContent = d.description || '';
      if (d.description) box.classList.add('visible');
    }
  } catch (_) {
    box.textContent = 'Unable to fetch medication information.';
    box.classList.add('visible');
  }

  spin.classList.remove('visible');
}

/* ─── Utilities ─────────────────────────────────────────── */
function isoDate(dt) {
  return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(t) {
  if (!t || t === 'anytime') return 'As Needed';
  const [h, m] = t.split(':').map(Number);
  return `${h % 12 || 12}:${pad(m)} ${h >= 12 ? 'PM' : 'AM'}`;
}
function fmtFreq(f) {
  return { daily:'Daily', twice_daily:'Twice Daily', three_times:'3× Daily',
           weekly:'Weekly', as_needed:'As Needed' }[f] || f;
}
